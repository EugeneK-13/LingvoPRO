function startDialogue(dialogueId){
  const dlg = DIALOGUES.find(d => d.id === dialogueId);
  if(!dlg){ showToast('Диалог не найден','error'); return; }

  let stepIdx = 0, correct = 0;
  const history = []; // completed exchanges shown in chat

  function renderStep(){
    if(stepIdx >= dlg.steps.length){ finishDialogue(); return; }
    const step = dlg.steps[stepIdx];

    // Build chat history HTML
    let historyHtml = history.map(h => `
      <div class="chat-bubble-wrap">
        <div class="chat-avatar npc">${dlg.npc}</div>
        <div class="chat-bubble npc">
          <div class="chat-ro">${h.npc.ro}</div>
          <div class="chat-ru">${h.npc.ru}</div>
        </div>
      </div>
      <div class="chat-bubble-wrap user">
        <div class="chat-avatar user-av">${state.userAvatar||'🧑'}</div>
        <div class="chat-bubble user-b">
          <div class="chat-ro">${h.chosen.ro}</div>
          <div class="chat-ru">${h.chosen.ru}</div>
        </div>
      </div>
    `).join('');

    // Options for current step
    const optionsHtml = step.options.map((opt,i) =>
      `<button class="chat-option" data-didx="${i}" onclick="APP.dialogueAnswer(${i})">
        <div style="font-weight:600;margin-bottom:2px">${opt.ro}</div>
        <div style="font-size:12px;opacity:0.7">${opt.ru}</div>
      </button>`
    ).join('');

    openModal(`
      <div class="modal-header">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="font-size:22px">${dlg.emoji}</div>
          <div>
            <div style="font-weight:700;font-size:15px">${dlg.title}</div>
            <div style="font-size:11px;color:var(--text3)">Шаг ${stepIdx+1} из ${dlg.steps.length}</div>
          </div>
        </div>
        <button class="nav-btn" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body" id="dlg-body" style="max-height:65vh;overflow-y:auto">
        ${historyHtml}
        <!-- Current NPC line -->
        <div class="chat-bubble-wrap">
          <div class="chat-avatar npc">${dlg.npc}</div>
          <div class="chat-bubble npc">
            <div class="chat-ro">${step.npc.ro}</div>
            <div class="chat-ru">${step.npc.ru}</div>
          </div>
        </div>
        <!-- Options -->
        <div class="chat-options" id="dlg-opts">${optionsHtml}</div>
        <div id="dlg-feedback" style="min-height:16px"></div>
      </div>
    `);

    // Scroll to bottom
    setTimeout(()=>{
      const body = document.getElementById('dlg-body');
      if(body) body.scrollTop = body.scrollHeight;
      speak(step.npc.ro);
    }, 120);
  }

  APP.dialogueAnswer = function(optIdx){
    const step = dlg.steps[stepIdx];
    const opt  = step.options[optIdx];
    const isOk = opt.correct;

    // Highlight choice
    document.querySelectorAll('.chat-option').forEach((btn,i)=>{
      btn.disabled = true;
      if(i === optIdx) btn.classList.add(isOk ? 'correct' : 'wrong');
      if(!isOk && step.options[i].correct) btn.classList.add('correct');
    });

    // Show feedback
    const fb = document.getElementById('dlg-feedback');
    if(fb) fb.innerHTML = `<div style="font-size:12px;color:${isOk?'var(--green)':'var(--coral)'};margin-top:8px;padding:10px 14px;background:${isOk?'var(--green-s)':'var(--coral-s)'};border-radius:10px;line-height:1.5">${opt.feedback}</div>`;

    if(isOk){ correct++; audioFeedback('correct'); }
    else     { audioFeedback('wrong'); }

    // Advance
    setTimeout(()=>{
      history.push({ npc: step.npc, chosen: opt });
      stepIdx++;
      renderStep();
    }, 1600);
  };

  function finishDialogue(){
    const pct  = Math.round(correct / dlg.steps.length * 100);
    const xp   = Math.round(pct / 100 * 80) + 20;
    addXP(xp);
    state.todayExercises++;
    state.accuracy = Math.round((state.accuracy * 4 + pct) / 5);
    updateDailyHistory(correct, 1);
    saveState();
    audioFeedback('complete');

    // Full chat replay
    const replayHtml = history.map(h => `
      <div class="chat-bubble-wrap">
        <div class="chat-avatar npc">${dlg.npc}</div>
        <div class="chat-bubble npc">
          <div class="chat-ro">${h.npc.ro}</div>
          <div class="chat-ru">${h.npc.ru}</div>
        </div>
      </div>
      <div class="chat-bubble-wrap user">
        <div class="chat-avatar user-av">${state.userAvatar||'🧑'}</div>
        <div class="chat-bubble user-b">
          <div class="chat-ro">${h.chosen.ro}</div>
          <div class="chat-ru">${h.chosen.ru}</div>
        </div>
      </div>
    `).join('');

    openModal(`
      <div class="modal-header">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="font-size:22px">${dlg.emoji}</div>
          <div><div style="font-weight:700;font-size:15px">${dlg.title} — завершено!</div></div>
        </div>
        <button class="nav-btn" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body" style="max-height:55vh;overflow-y:auto">
        ${replayHtml}
      </div>
      <div style="padding:20px 24px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
        <div>
          <div style="font-weight:700">${pct}% верных ответов</div>
          <div style="font-size:12px;color:var(--text3)">+${xp} XP получено</div>
        </div>
        <div style="display:flex;gap:10px">
          <button class="btn btn-ghost btn-sm" onclick="startDialogue('${dlg.id}')">Повторить</button>
          <button class="btn btn-primary btn-sm" onclick="closeModal();navigateTo('lessons')">К урокам</button>
        </div>
      </div>
    `);
  }

  renderStep();
}

// ─── DAILY CHALLENGE ───
function getDailyChallenge(){
  const catKeys = Object.keys(VOCAB);
  const today = new Date();
  const dayOfYear = Math.floor((today - new Date(today.getFullYear(),0,0)) / 86400000);
  const catKey = catKeys[dayOfYear % catKeys.length];
  const cat = VOCAB[catKey];
  const wordCount = 6 + (dayOfYear % 3);
  const xpReward  = wordCount>=8 ? 200 : wordCount>=7 ? 160 : 120;
  const dateKey = `${today.getFullYear()}-${today.getMonth()}-${today.getDate()}`;
  return { catKey, cat, wordCount, xpReward, dateKey };
}

function startChallenge(){
  const {catKey, cat, wordCount, xpReward, dateKey} = getDailyChallenge();
  const doneKey = `lingvoPRO_challenge_${dateKey}`;
  if(localStorage.getItem(doneKey)){
    openModal(`
      <div class="modal-body" style="text-align:center;padding:44px">
        <div style="font-size:56px;margin-bottom:16px">✅</div>
        <h3 style="font-size:22px;font-weight:800;margin-bottom:8px">Челлендж уже пройден!</h3>
        <p style="color:var(--text2);margin-bottom:28px;line-height:1.6">Ты уже выполнил(а) сегодняшний челлендж. Возвращайся завтра за новым!</p>
        <button class="btn btn-primary" onclick="closeModal()">Отлично!</button>
      </div>
    `);
    return;
  }
  const words = [...cat.words].sort(()=>Math.random()-0.5).slice(0, wordCount);
  let idx=0, correct=0, timer=300;
  function show(){
    if(idx>=words.length){ endChallenge(); return; }
    const w = words[idx];
    const distractors = ALL_WORDS.filter(x=>x.ru!==w.ru).sort(()=>Math.random()-0.5).slice(0,3);
    const opts = [...distractors.map(x=>x.ru), w.ru].sort(()=>Math.random()-0.5);
    const mm = String(Math.floor(timer/60)).padStart(2,'0');
    const ss = String(timer%60).padStart(2,'0');
    document.getElementById('modal-inner').innerHTML = `
      <div class="modal-header" style="background:linear-gradient(135deg,rgba(42,111,219,0.07),rgba(124,92,191,0.06))">
        <div>
          <div style="font-size:11px;color:var(--text3);font-weight:700;letter-spacing:1px;text-transform:uppercase">🎯 Ежедневный Челлендж</div>
          <div style="font-weight:700;font-size:15px;margin-top:2px">${cat.emoji} ${cat.title} · ${idx+1}/${words.length}</div>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          <div style="font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:700;color:${timer<60?'var(--coral)':'#d97706'}" id="ch-timer">${mm}:${ss}</div>
          <button class="nav-btn" onclick="clearInterval(APP.chInt);closeModal()"><i class="fa-solid fa-xmark"></i></button>
        </div>
      </div>
      <div class="modal-body">
        <div class="progress-track" style="margin-bottom:20px">
          <div class="progress-fill" style="width:${Math.round(idx/words.length*100)}%;background:linear-gradient(90deg,var(--accent),var(--violet))"></div>
        </div>
        <div style="text-align:center;padding:24px;background:var(--bg3);border-radius:18px;margin-bottom:20px;border:1px solid var(--border)">
          <div style="font-size:13px;color:var(--text3);margin-bottom:8px;font-weight:500">${cat.emoji} Переведи на русский:</div>
          <div style="font-size:28px;font-weight:800;letter-spacing:-0.5px;margin-bottom:8px">${w.ro}</div>
          <button onclick="speak('${escAttr(w.ro)}')" class="btn btn-ghost btn-sm"><i class="fa-solid fa-volume-high"></i></button>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px">
          ${opts.map(opt=>`<button class="quiz-option" onclick="chalAnswer('${escAttr(opt)}','${escAttr(w.ru)}')">${opt}</button>`).join('')}
        </div>
      </div>`;
  }
  APP.chalAnswer = window.chalAnswer = function(chosen, correct_ans){
    if(chosen===correct_ans){ correct++; }
    idx++; show();
  };
  function endChallenge(){
    clearInterval(APP.chInt);
    const threshold = Math.ceil(words.length*0.75);
    const xp = correct>=threshold ? xpReward : correct>=Math.ceil(words.length*0.5) ? Math.round(xpReward*0.6) : Math.round(xpReward*0.3);
    addXP(xp); state.todayExercises++; state.streak++;
    onStreakIncrement();
    updateDailyHistory(correct, 1);
    saveState();
    localStorage.setItem(doneKey,'1');
    document.getElementById('modal-inner').innerHTML = `
      <div class="modal-body" style="text-align:center;padding:44px">
        <div style="font-size:64px;margin-bottom:16px">${correct>=threshold?'🏆':correct>=Math.ceil(words.length*0.5)?'🎉':'💪'}</div>
        <h2 style="font-size:26px;font-weight:800;margin-bottom:16px">Челлендж завершён!</h2>
        <div style="font-size:42px;font-weight:800;color:#d97706;letter-spacing:-2px">+${xp} XP</div>
        <div style="color:var(--text2);margin:12px 0 28px;font-weight:500">${correct} из ${words.length} правильно</div>
        ${correct>=threshold?`<div class="badge badge-amber" style="margin-bottom:16px;font-size:13px;padding:6px 14px">🔥 Стрик: ${state.streak} дней!</div>`:''}
        <div style="display:flex;gap:12px;justify-content:center">
          <button class="btn btn-ghost" onclick="closeModal()">Закрыть</button>
          <button class="btn btn-primary" onclick="closeModal();navigateTo('home')">На главную</button>
        </div>
      </div>`;
  }
  openModal('');
  setTimeout(()=>{
    show();
    APP.chInt = setInterval(()=>{
      timer--;
      const el = document.getElementById('ch-timer');
      if(el){
        const mm=String(Math.floor(timer/60)).padStart(2,'0');
        const ss=String(timer%60).padStart(2,'0');
        el.textContent=`${mm}:${ss}`;
        el.style.color=timer<60?'var(--coral)':'#d97706';
      }
      if(timer<=0){ clearInterval(APP.chInt); endChallenge(); }
    }, 1000);
  }, 50);
}

          onclick="APP.startAdaptiveAssessment('little')">

          <div style="font-size:12px;color:var(--text2)">Приветствия, числа, базовые фразы</div>

        <button class="card card-hover" style="padding:16px 20px;text-align:left;cursor:pointer;border:none"
          onclick="APP.startAdaptiveAssessment('some')">

          <div style="font-size:12px;color:var(--text2)">Объясняюсь в простых ситуациях, знаю основы грамматики</div>
        </button>
        <button class="card card-hover" style="padding:16px 20px;text-align:left;cursor:pointer;border:none"
          onclick="APP.startAdaptiveAssessment('confident')">

          <div style="font-size:12px;color:var(--text2)">Читаю, понимаю речь, знаю времена глаголов</div>

APP.startAdaptiveAssessment = function(priorExp){
  const startDiff = {
    'none':'А1-easy','little':'А1-hard',
    'some':'А2-easy','confident':'А2-hard'
  }[priorExp] || 'А1-easy';

  const MAX_Q = 20;
  const a1Keys = Object.keys(VOCAB).filter(k=>VOCAB[k].level==='А1');
  const a2Keys = Object.keys(VOCAB).filter(k=>VOCAB[k].level==='А2');
  const a1Words = a1Keys.flatMap(k=>VOCAB[k].words.map(w=>({...w,cat:k,level:'А1'})));
  const a2Words = a2Keys.flatMap(k=>VOCAB[k].words.map(w=>({...w,cat:k,level:'А2'})));

  const easyA1Keys = ['greetings','numbers','family','verbs'];
  const a1Easy = a1Words.filter(w=>easyA1Keys.includes(w.cat)).sort(()=>Math.random()-0.5);
  const a1Hard = a1Words.filter(w=>!easyA1Keys.includes(w.cat)).sort(()=>Math.random()-0.5);
  const easyA2Keys = ['food','travel','health'];
  const a2Easy = a2Words.filter(w=>easyA2Keys.includes(w.cat)).sort(()=>Math.random()-0.5);
  const a2Hard = a2Words.filter(w=>!easyA2Keys.includes(w.cat)).sort(()=>Math.random()-0.5);

  const Q_TYPES = ['ro_ru','ru_ro','ro_ru','fill','ro_ru','ru_ro'];
  let idx=0, correct=0, streak=0, wrongStreak=0, currentDiff=startDiff;
  const usedWords=new Set(), history=[];

  function pickWord(){
    const pools = {
      'А1-easy': a1Easy,
      'А1-hard': [...a1Hard, ...a1Easy.slice(0,10)],
      'А2-easy': a2Easy,
      'А2-hard': [...a2Hard, ...a2Easy.slice(0,5)]
    };
    const pool = pools[currentDiff] || a1Easy;
    const fresh = pool.filter(w=>!usedWords.has(w.ro));
    return fresh.length>0 ? fresh[Math.floor(Math.random()*fresh.length)]
                          : pool[Math.floor(Math.random()*pool.length)];
  }

  function smartDistractors(w, count){
    const samecat   = ALL_WORDS.filter(x=>x.cat===w.cat && x.ru!==w.ru);
    const samelevel = ALL_WORDS.filter(x=>{ const v=VOCAB[x.cat]; return v && v.level===VOCAB[w.cat]?.level && x.ru!==w.ru; });
    const all       = ALL_WORDS.filter(x=>x.ru!==w.ru);
    const pool = samecat.length>=count ? samecat : samelevel.length>=count ? samelevel : all;
    return [...pool].sort(()=>Math.random()-0.5).slice(0, count);
  }

  function adaptDifficulty(){
    if(streak>=3){
      streak=0;
      const up={'А1-easy':'А1-hard','А1-hard':'А2-easy','А2-easy':'А2-hard','А2-hard':'А2-hard'};
      currentDiff = up[currentDiff] || currentDiff;
    }
    if(wrongStreak>=2){
      wrongStreak=0;
      const dn={'А2-hard':'А2-easy','А2-easy':'А1-hard','А1-hard':'А1-easy','А1-easy':'А1-easy'};
      currentDiff = dn[currentDiff] || currentDiff;
    }
  }

  function showQ(){
    if(idx>=MAX_Q){ finishAdaptiveAssessment(correct,idx,history); return; }
    const qtype   = Q_TYPES[idx % Q_TYPES.length];
    const w       = pickWord();
    usedWords.add(w.ro);
    const pct     = Math.round(idx / MAX_Q * 100);
    const letters = ['A','B','C','D'];
    let qHTML='', correctAns='', opts=[];

    if(qtype==='ro_ru'){
      const dist = smartDistractors(w, 3);
      opts = [...dist.map(d=>d.ru), w.ru].sort(()=>Math.random()-0.5);
      correctAns = w.ru;
      qHTML = '<div style="text-align:center;padding:22px;background:var(--bg3);border-radius:16px;margin-bottom:18px;border:1px solid var(--border)">'
        +'<div style="font-size:11px;color:var(--text3);margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px">Что это значит по-русски?</div>'
        +'<div style="font-size:28px;font-weight:800;letter-spacing:-0.4px;margin-bottom:10px">'+w.ro+'</div>'
        +'<button onclick="APP.assessSpeak()" class="btn btn-ghost btn-sm"><i class="fa-solid fa-volume-high"></i> Послушать</button>'
        +'</div>';
      APP._assessWord = w.ro;
    } else if(qtype==='ru_ro'){
      const dist = smartDistractors(w, 3);
      opts = [...dist.map(d=>d.ro), w.ro].sort(()=>Math.random()-0.5);
      correctAns = w.ro;
      qHTML = '<div style="text-align:center;padding:22px;background:var(--bg3);border-radius:16px;margin-bottom:18px;border:1px solid var(--border)">'
        +'<div style="font-size:11px;color:var(--text3);margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px">Как сказать по-румынски?</div>'
        +'<div style="font-size:26px;font-weight:800;letter-spacing:-0.3px">'+w.ru+'</div>'
        +'</div>';
    } else {
      // fill — blank out target word; fall back to ro_ru if word not in sentence
      const fw = pickWord();
      usedWords.add(fw.ro);
      const sentence  = fw.ex || '';
      const cleanSent = sentence.replace(/[.,!?]/g,'');
      const wordInSent = cleanSent.toLowerCase().includes(fw.ro.toLowerCase());

      if(!wordInSent || !sentence){
        // Fallback: treat as ro_ru question
        const dist = smartDistractors(fw, 3);
        opts = [...dist.map(d=>d.ru), fw.ru].sort(()=>Math.random()-0.5);
        correctAns = fw.ru;
        qHTML = '<div style="text-align:center;padding:22px;background:var(--bg3);border-radius:16px;margin-bottom:18px;border:1px solid var(--border)">'
          +'<div style="font-size:11px;color:var(--text3);margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px">Что это значит по-русски?</div>'
          +'<div style="font-size:28px;font-weight:800;letter-spacing:-0.4px;margin-bottom:10px">'+fw.ro+'</div>'
          +'<button onclick="APP.assessSpeak()" class="btn btn-ghost btn-sm"><i class="fa-solid fa-volume-high"></i> Послушать</button>'
          +'</div>';
        APP._assessWord = fw.ro;
      } else {
        const escaped = fw.ro.replace(/[-.*+?^${}()|[\]\\]/g,'\\$&');
        const blanked = sentence.replace(new RegExp(escaped,'i'),'______');
        const dist = smartDistractors(fw, 3);
        opts = [...dist.map(d=>d.ro), fw.ro].sort(()=>Math.random()-0.5);
        correctAns = fw.ro;
        qHTML = '<div style="padding:18px;background:var(--bg3);border-radius:16px;margin-bottom:18px;border:1px solid var(--border)">'
          +'<div style="font-size:11px;color:var(--text3);margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px">Заполни пропуск:</div>'
          +'<div style="font-size:16px;font-weight:600;line-height:1.7;color:var(--text)">'+blanked+'</div>'
          +(fw.exRu ? '<div style="font-size:12px;color:var(--text3);margin-top:6px">'+fw.exRu+'</div>' : '')
          +'</div>';
      }
    }

    const diffLabel = currentDiff.replace('-',' ').toUpperCase();
    const diffColor = currentDiff.startsWith('А1') ? 'var(--accent)' : 'var(--violet)';
    const typeLabel = qtype==='ro_ru' ? '🇷🇴 → 🇷🇺' : qtype==='ru_ro' ? '🇷🇺 → 🇷🇴' : '✏️ Пропуск';

    openModal(`
      <div class="modal-header">
        <div>
          <div style="font-size:11px;color:var(--text3);font-weight:500">
            Тест · ${idx+1}/${MAX_Q} · ${typeLabel} ·
            <span style="color:${diffColor};font-weight:700">${diffLabel}</span>
          </div>
          <div style="font-weight:700;font-size:14px;color:var(--text2)">
            ${qtype==='ro_ru'?'Переведи на русский':qtype==='ru_ro'?'Переведи на румынский':'Заполни пропуск'}
          </div>
        </div>
        <button class="nav-btn" onclick="APP.skipAssessmentModal()"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body">
        <div class="progress-track" style="margin-bottom:18px">
          <div class="progress-fill" style="width:${pct}%;background:linear-gradient(90deg,var(--accent),var(--violet))"></div>
        </div>
        ${qHTML}
        <div style="display:flex;flex-direction:column;gap:9px" id="assessment-opts">
          ${opts.map((opt,i)=>'<button class="quiz-option" data-aopt="'+i+'" id="aopt-'+i+'"><span class="opt-letter">'+letters[i]+'</span> '+opt+'</button>').join('')}
        </div>
        <div id="assessment-feedback" style="min-height:36px;margin-top:12px;text-align:center"></div>
      </div>
    `);

    APP._qa = {correctAns, w, qtype};

    setTimeout(()=>{
      const container = document.getElementById('assessment-opts');
      if(container) container.addEventListener('click', e=>{
        const btn = e.target.closest('button[data-aopt]');
        if(!btn) return;
        const chosen = btn.textContent.trim().slice(1).trim();
        APP.assessmentAnswer(chosen);
      });
    }, 50);

    idx++;
  }

  // Speak button handler — avoids inline onclick escaping
  APP.assessSpeak = function(){
    if(APP._assessWord) speak(APP._assessWord);
  };

  APP.assessmentAnswer = function(chosen){
    const {correctAns, w, qtype} = APP._qa || {};
    const isOk = chosen === correctAns;
    if(isOk){ correct++; streak++; wrongStreak=0; audioFeedback('correct'); }
    else     { wrongStreak++; streak=0; audioFeedback('wrong'); }
    history.push({word:w, type:qtype, isOk});
    adaptDifficulty();

    document.querySelectorAll('#assessment-opts .quiz-option').forEach(btn=>{
      btn.disabled = true;
      const txt = btn.textContent.trim().slice(1).trim();
      if(txt===correctAns) btn.classList.add('correct');
      else if(txt===chosen && !isOk) btn.classList.add('wrong');
    });
    const fb = document.getElementById('assessment-feedback');
    if(fb) fb.innerHTML = isOk
      ? '<span style="color:var(--green);font-weight:600;font-size:13px"><i class="fa-solid fa-check-circle"></i> Верно!</span>'
      : '<span style="color:var(--coral);font-weight:600;font-size:13px"><i class="fa-solid fa-circle-xmark"></i> Правильно: <strong>'+correctAns+'</strong></span>';

    setTimeout(()=>showQ(), 950);
  };

  APP.skipAssessmentModal = function(){
    state.assessmentDone=true; state.assessmentLevel='beginner'; saveState();
    closeModal(); navigateTo('home');
  };

  showQ();
};

function finishAdaptiveAssessment(correct, total, history){
  const pct = total>0 ? Math.round(correct/total*100) : 0;
  const a1Qs  = history.filter(h=>h.word?.level==='А1');
  const a2Qs  = history.filter(h=>h.word?.level==='А2');
  const a1Pct = a1Qs.length>0 ? Math.round(a1Qs.filter(h=>h.isOk).length/a1Qs.length*100) : null;
  const a2Pct = a2Qs.length>0 ? Math.round(a2Qs.filter(h=>h.isOk).length/a2Qs.length*100) : null;
  const ro2ru = history.filter(h=>h.type==='ro_ru');
  const ru2ro = history.filter(h=>h.type==='ru_ro');
  const fills  = history.filter(h=>h.type==='fill');
  function ts(qs){ return qs.length>0 ? Math.round(qs.filter(h=>h.isOk).length/qs.length*100) : null; }

  const a1Keys = Object.keys(VOCAB).filter(k=>VOCAB[k].level==='А1');
  const a2Keys = Object.keys(VOCAB).filter(k=>VOCAB[k].level==='А2');
  let level, xpSeed, completedKeys, emoji, title, desc, nextStep;

  if(pct>=80 && (a2Pct===null || a2Pct>=60)){
    level='advanced'; xpSeed=700; completedKeys=[...a1Keys,...a2Keys];
    emoji='🏆'; title='Продвинутый уровень';
    desc='Отличный результат! Ты уверенно знаешь А1 и А2. Все уроки открыты.';
    nextStep='Начни с диалогов и практики — всё уже разблокировано';
  } else if(pct>=65){
    level='upper-intermediate'; xpSeed=500; completedKeys=[...a1Keys,...a2Keys.slice(0,3)];
    emoji='🎓'; title='Выше среднего';
    desc='А1 хорошо усвоен, А2 — частично. Пропускаем А1 и начинаем с А2.';
    nextStep='Начни с первых уроков А2';
  } else if(pct>=45){
    level='intermediate'; xpSeed=300; completedKeys=a1Keys.slice(0,4);
    emoji='👍'; title='Средний уровень';
    desc='Базовые слова знакомы. Пропускаем самые простые и начинаем с середины А1.';
    nextStep='Продолжи А1 с урока 5';
  } else if(pct>=20){
    level='elementary'; xpSeed=100; completedKeys=[];
    emoji='📗'; title='Элементарный уровень';
    desc='Кое-что знаешь, но основ не хватает. Начнём с А1 — шаг за шагом.';
    nextStep='Начни с урока 1 А1';
  } else {
    level='beginner'; xpSeed=0; completedKeys=[];
    emoji='🌱'; title='Начинающий';
    desc='Румынский — новый язык. Начнём с самых основ.';
    nextStep='Начни с урока 1 А1';
  }

  state.assessmentDone=true; state.assessmentLevel=level;
  if(xpSeed>0){
    state.xp += xpSeed;
    const navXp = document.getElementById('nav-xp');
    if(navXp) navXp.textContent = state.xp + ' XP';
  }
  completedKeys.forEach(k=>{
    if(!state.completedLessons.includes(k)){
      state.completedLessons.push(k);
      if(!state.lessonScores[k]) state.lessonScores[k] = pct;
    }
  });
  saveState();
  audioFeedback('complete');

  function bar(label, p){
    if(p===null) return '';
    const c = p>=70?'var(--green)':p>=40?'var(--yellow)':'var(--coral)';
    return '<div style="margin-bottom:10px">'
      +'<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;color:var(--text2)">'
      +'<span>'+label+'</span><span style="font-weight:700;color:'+c+'">'+p+'%</span></div>'
      +'<div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden">'
      +'<div style="height:100%;width:'+p+'%;background:'+c+';border-radius:3px;transition:width 0.6s"></div>'
      +'</div></div>';
  }

  const badgeClass = pct>=80?'badge-green':pct>=65?'badge-blue':pct>=45?'badge-amber':'badge-violet';

  openModal(`
    <div class="modal-header">
      <h3 style="font-size:17px;font-weight:800">Результаты теста</h3>
    </div>
    <div class="modal-body" style="padding-bottom:4px">
      <div style="display:flex;align-items:center;gap:20px;margin-bottom:22px;padding-bottom:20px;border-bottom:1px solid var(--border)">
        <div class="score-ring" style="flex-shrink:0;width:88px;height:88px">
          <svg width="88" height="88" viewBox="0 0 120 120">
            <circle cx="60" cy="60" r="50" fill="none" stroke="var(--bg3)" stroke-width="10"/>
            <circle cx="60" cy="60" r="50" fill="none"
              stroke="${pct>=65?'var(--green)':pct>=45?'var(--yellow)':'var(--accent)'}"
              stroke-width="10"
              stroke-dasharray="${Math.round(pct*3.14)} 314"
              stroke-linecap="round"/>
          </svg>
          <div class="score-ring-text">
            <div style="font-size:18px;font-weight:800">${pct}%</div>
            <div style="font-size:10px;color:var(--text3)">${correct}/${total}</div>
          </div>
        </div>
        <div>
          <div style="font-size:28px;margin-bottom:4px">${emoji}</div>
          <div class="badge ${badgeClass}" style="font-size:12px;padding:4px 12px;margin-bottom:8px">${title}</div>
          <div style="font-size:13px;color:var(--text2);line-height:1.5">${desc}</div>
        </div>
      </div>

      <div style="background:var(--bg3);border-radius:14px;padding:16px;margin-bottom:18px;border:1px solid var(--border)">
        <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:14px">📊 Анализ по навыкам</div>
        ${bar('🇷🇴 → 🇷🇺  Понимание румынского', ts(ro2ru))}
        ${bar('🇷🇺 → 🇷🇴  Производство на румынском', ts(ru2ro))}
        ${bar('✏️  Заполни пропуск', ts(fills))}
        ${a1Pct!==null ? bar('📗  Словарь А1', a1Pct) : ''}
        ${a2Pct!==null ? bar('📘  Словарь А2', a2Pct) : ''}
      </div>

      <div style="background:var(--accent-s);border:1px solid rgba(42,111,219,0.2);border-radius:12px;padding:14px 16px;margin-bottom:18px">
        <div style="font-weight:700;color:var(--accent);font-size:13px;margin-bottom:4px">👉 Рекомендация</div>
        <div style="font-size:13px;color:var(--text2)">${nextStep}</div>
        ${xpSeed>0 ? '<div style="color:var(--yellow);font-weight:700;font-size:12px;margin-top:6px">⚡ +'+xpSeed+' XP начислено</div>' : ''}
      </div>

      <button class="btn btn-primary" style="width:100%;justify-content:center;padding:13px;font-size:15px"
        onclick="closeModal();navigateTo('lessons');showToast('Добро пожаловать, '+state.userName+'! 🇷🇴','success')">
        Начать учиться <i class="fa-solid fa-arrow-right"></i>
      </button>
    </div>
  `);
}

function finishAssessment(correct, total){
  finishAdaptiveAssessment(correct, total, []);
}


function generateShareCard(){
  const W=600, H=320;
  const canvas=document.createElement('canvas');
  canvas.width=W*2; canvas.height=H*2;
  const ctx=canvas.getContext('2d');
  ctx.scale(2,2);
  const isDark = document.documentElement.getAttribute('data-theme')==='dark';
  const bg=isDark?'#1e2438':'#ffffff', bg2=isDark?'#252d45':'#f5f7fa';
  const text1=isDark?'#e8eaf2':'#1f2937', text2c=isDark?'#8891ab':'#6b7280';
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
  const grad=ctx.createLinearGradient(0,0,W,0);
  grad.addColorStop(0,'#2a6fdb'); grad.addColorStop(1,'#7c5cbf');
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,6);
  ctx.fillStyle=bg2;
  ctx.beginPath(); ctx.roundRect(24,24,W-48,H-48,16); ctx.fill();
  ctx.fillStyle='#2a6fdb';
  ctx.beginPath(); ctx.arc(80,100,36,0,Math.PI*2); ctx.fill();
  ctx.font='32px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(state.userAvatar||'🦁',80,100);
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  ctx.fillStyle=text1; ctx.font='bold 22px Inter,Arial,sans-serif';
  ctx.fillText(state.userName||'Пользователь',132,88);
  const lvl=state.xp<500?'Начинающий':state.xp<2000?'Любитель':state.xp<5000?'Опытный':'Эксперт';
  ctx.font='13px Inter,Arial,sans-serif'; ctx.fillStyle='#2a6fdb';
  ctx.fillText('🎓 '+lvl,133,113);
  ctx.strokeStyle=isDark?'rgba(255,255,255,0.08)':'#e4e8f0';
  ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(48,148); ctx.lineTo(W-48,148); ctx.stroke();
  const stats=[
    {icon:'⚡',value:state.xp+' XP',label:'Опыт',color:'#f5a623'},
    {icon:'🔥',value:state.streak+' дн',label:'Стрик',color:'#ff6b6b'},
    {icon:'📚',value:String(state.wordsLearned),label:'Слов',color:'#1aad72'},
    {icon:'🎯',value:state.accuracy+'%',label:'Точность',color:'#7c5cbf'},
  ];
  stats.forEach((s,i)=>{
    const x=60+i*128, y=190;
    ctx.font='22px serif'; ctx.textAlign='center';
    ctx.fillText(s.icon,x,y);
    ctx.font='bold 18px Inter,Arial,sans-serif'; ctx.fillStyle=s.color;
    ctx.fillText(s.value,x,y+28);
    ctx.font='12px Inter,Arial,sans-serif'; ctx.fillStyle=text2c;
    ctx.fillText(s.label,x,y+45);
  });
  ctx.textAlign='right';
  ctx.font='bold 13px Inter,Arial,sans-serif'; ctx.fillStyle='#2a6fdb';

function setupAvatarPicker(){
  const grid = document.getElementById('reg-avatar-grid');
  if(!grid) return;
  const selected = state.userAvatar || AVATARS[0];
  let html='', pos=0;
  AVATAR_GROUPS.forEach(g=>{
    html+='<div style="grid-column:1/-1;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.7px;padding:8px 0 4px">'+g.label+'</div>';
    AVATARS.slice(pos,pos+g.count).forEach(a=>{
      const s=a===selected;
      html+='<button onclick="selectAvatar(\'' + a.replace(/'/g,"\'") + '\')" id="av-'+a.codePointAt(0)+'" style="font-size:20px;padding:5px;border-radius:9px;border:2px solid '+(s?'var(--accent)':'var(--border)')+';background:'+(s?'var(--accent-s)':'var(--surface)')+';cursor:pointer;transition:all 0.15s;line-height:1">'+a+'</button>';
    });
    pos+=g.count;
  });
  grid.innerHTML=html;
  // Wire via event delegation
  grid.addEventListener('click', e=>{
    const btn = e.target.closest('button[data-ravatar]');
    if(!btn) return;
    const cp = parseInt(btn.dataset.ravatar);
    const a  = AVATARS.find(x => x.codePointAt(0)===cp);
    if(a) APP.selectAvatar(a);
  });
}

APP.selectAvatar = window.selectAvatar = function(a){

  if(preview){ preview.textContent=a; preview.style.transform='scale(1.12)'; setTimeout(()=>preview.style.transform='scale(1)',200); }
  document.querySelectorAll('[id^="av-"]').forEach(btn=>{
    const isSelected = btn.textContent.trim()===a;
    btn.style.borderColor = isSelected?'var(--accent)':'var(--border)';
    btn.style.background  = isSelected?'var(--accent-s)':'var(--surface)';
  });
};

document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

// ═══════════════════════════════════
//  TOAST
// ═══════════════════════════════════
function showToast(msg, type='info'){
  const icons = { success:'✅', error:'❌', info:'💡' };
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.innerHTML = `<span class="toast-icon">${icons[type]}</span><span>${msg}</span>`;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(()=>{ t.classList.add('hiding'); setTimeout(()=>t.remove(),300); }, 3500);
}

// ═══════════════════════════════════
//  TTS  —  Romanian-optimised
// ═══════════════════════════════════

// Phonetic pre-processing: convert Romanian diacritics and letter combos
// to spellings that Web Speech engines pronounce correctly in any Romance voice
function roPhonetic(text){
  return text
    // Romanian special letters → approximate phonetics
    .replace(/ș/gi, 'sh').replace(/ş/gi, 'sh')   // ș → sh
    .replace(/ț/gi, 'ts').replace(/ţ/gi, 'ts')   // ț → ts
    .replace(/ă/gi, 'uh')                          // ă → uh (schwa)
    .replace(/â/gi, 'uh').replace(/î/gi, 'uh')    // â/î → uh
    // Common letter combos for better Italian/Portuguese voice rendering
    .replace(/ce/gi, 'che').replace(/ci/gi, 'chi')
    .replace(/ge/gi, 'je').replace(/gi/gi, 'ji')
    .replace(/ch/gi, 'k')
    .replace(/gh/gi, 'g');
}

// Cache the best available voice
let _roVoice = null;
let _voicesLoaded = false;

function findBestVoice(){
  if(_roVoice) return _roVoice;
  const voices = speechSynthesis.getVoices();
  if(!voices.length) return null;

  // Priority 1: native Romanian
  const ro = voices.find(v => v.lang.startsWith('ro'));
  if(ro){ _roVoice = ro; return ro; }

  // Priority 2: Italian (closest phonetics to Romanian)
  const it = voices.find(v => v.lang.startsWith('it'));
  if(it){ _roVoice = it; return it; }

  // Priority 3: Portuguese (also Romance, good diacritics)
  const pt = voices.find(v => v.lang.startsWith('pt'));
  if(pt){ _roVoice = pt; return pt; }

  // Priority 4: Spanish
  const es = voices.find(v => v.lang.startsWith('es'));
  if(es){ _roVoice = es; return es; }

  // Fallback: anything
  _roVoice = voices[0];
  return _roVoice;
}

// Voices load async on some browsers
if(window.speechSynthesis){
  speechSynthesis.onvoiceschanged = ()=>{ _roVoice=null; findBestVoice(); _voicesLoaded=true; };
  // Trigger load
  speechSynthesis.getVoices();
}

function speak(text){
  if(!window.speechSynthesis) return;
  speechSynthesis.cancel();

  const voice = findBestVoice();
  const isNativeRo = voice && voice.lang.startsWith('ro');

  // Use phonetic text for non-native voices
  const spokenText = isNativeRo ? text : roPhonetic(text);

  const u = new SpeechSynthesisUtterance(spokenText);
  if(voice) u.voice = voice;
  u.lang  = isNativeRo ? 'ro-RO' : (voice ? voice.lang : 'it-IT');
  u.rate  = 0.78;   // slower for learners
  u.pitch = 1.0;
  speechSynthesis.speak(u);
}

// ═══════════════════════════════════
//  UTILS
// ═══════════════════════════════════
function escAttr(s){ return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

// Insert a diacritic character at cursor position in a text input
function insertDiacritic(inputId, char){
  const inp = document.getElementById(inputId);
  if(!inp || inp.disabled) return;
  const start = inp.selectionStart;
  const end   = inp.selectionEnd;
  const val   = inp.value;
  inp.value = val.slice(0, start) + char + val.slice(end);
  inp.selectionStart = inp.selectionEnd = start + char.length;
  inp.focus();
}

// ═══════════════════════════════════
//  WEB AUDIO FEEDBACK
//  Pure oscillator tones — zero external assets.
//  audioFeedback('correct' | 'wrong' | 'complete')
// ═══════════════════════════════════
(function(){
  let _ctx = null;
  function ctx(){
    if(!_ctx) _ctx = new (window.AudioContext || window.webkitAudioContext)();
    return _ctx;
  }
  function tone(freq, type, startT, dur, gainVal){
    const ac  = ctx();
    const osc = ac.createOscillator();
    const g   = ac.createGain();
    osc.connect(g);
    g.connect(ac.destination);
    osc.type      = type;
    osc.frequency.setValueAtTime(freq, startT);
    g.gain.setValueAtTime(gainVal, startT);
    g.gain.exponentialRampToValueAtTime(0.0001, startT + dur);
    osc.start(startT);
    osc.stop(startT + dur + 0.01);
  }
  window.audioFeedback = function(type){
    if(!window.AudioContext && !window.webkitAudioContext) return;
    if(state && state.audioEnabled === false) return;
    try{
      const ac = ctx();
      const t  = ac.currentTime;
      if(type === 'correct'){
        // two-note ascending chime
        tone(660, 'sine', t,       0.12, 0.18);
        tone(880, 'sine', t + 0.1, 0.18, 0.14);
      } else if(type === 'wrong'){
        // low dull thud
        tone(180, 'sawtooth', t,       0.08, 0.14);
        tone(140, 'sawtooth', t + 0.06, 0.14, 0.10);
      } else if(type === 'complete'){
        // triumphant three-note arpeggio
        tone(523, 'sine', t,        0.14, 0.16);
        tone(659, 'sine', t + 0.12, 0.14, 0.14);
        tone(784, 'sine', t + 0.24, 0.28, 0.16);
      }
    } catch(e){}
  };
})();

// ═══════════════════════════════════
//  DARK / LIGHT MODE
// ═══════════════════════════════════
function applyTheme(dark){
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  const btn = document.getElementById('theme-toggle-btn');
  if(btn) btn.textContent = dark ? '☀️' : '🌙';
}
function toggleTheme(){
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const newDark = !isDark;
  localStorage.setItem('lingvoPRO_theme', newDark ? 'dark' : 'light');
  applyTheme(newDark);
}
function initTheme(){
  const saved = localStorage.getItem('lingvoPRO_theme');
  let dark;
  if(saved) {
    dark = saved === 'dark';
  } else {
    dark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  }
  applyTheme(dark);
}

// ═══════════════════════════════════
//  KEYBOARD SHORTCUTS
// ═══════════════════════════════════
/*
  Shortcut map (modal open context):
  ─────────────────────────────────────
  Space          → Flip flashcard (lesson #fc or random #rfc)
  ← ArrowLeft    → Answer "No / Didn't know" (after flip)
  → ArrowRight   → Answer "Yes / Knew it" (after flip)
  1 / 2 / 3 / 4 → Select quiz option (multiple choice, challenge, speed round)
  Enter          → Submit answer (fill-in-blank, listening)
  Escape         → Close modal (already handled)
  ─────────────────────────────────────
*/
document.addEventListener('keydown', e => {
  const overlay = document.getElementById('modal-overlay');
  const modalOpen = overlay && overlay.classList.contains('open');

  // Escape is already handled elsewhere; skip inputs so typing isn't blocked
  const tag = document.activeElement && document.activeElement.tagName;
  const inInput = (tag === 'INPUT' || tag === 'TEXTAREA');

  if(!modalOpen) return;

  // Space → flip flashcard
  if(e.code === 'Space' && !inInput){
    e.preventDefault();
    const fc  = document.getElementById('fc');
    const rfc = document.getElementById('rfc');
    if(fc)  fc.classList.toggle('flipped');
    if(rfc) rfc.classList.toggle('flipped');
    return;
  }

  // Arrow keys → Yes / No on lesson flashcards
  if(e.code === 'ArrowLeft' && !inInput){
    e.preventDefault();
    // Lesson flashcard
    if(APP.answerCard) APP.answerCard(false);
    // Random flashcard
    else if(APP.fcAnswer) APP.fcAnswer(false);
    return;
  }
  if(e.code === 'ArrowRight' && !inInput){
    e.preventDefault();
    if(APP.answerCard) APP.answerCard(true);
    else if(APP.fcAnswer) APP.fcAnswer(true);
    return;
  }

  // 1-4 → click quiz option
  if(['Digit1','Digit2','Digit3','Digit4'].includes(e.code) && !inInput){
    e.preventDefault();
    const i = parseInt(e.code.replace('Digit','')) - 1;
    const opts = document.querySelectorAll('.quiz-option');
    if(opts[i] && !opts[i].disabled) opts[i].click();
    return;
  }

  // Enter → submit fill-blank or listening (if input focused)
  if(e.code === 'Enter' && inInput){
    const fillSubmit = document.getElementById('fill-submit');
    if(fillSubmit && !fillSubmit.disabled){ fillSubmit.click(); return; }
    // Listening: trigger check via the global
    const listenInp = document.getElementById('listen-inp');
    if(listenInp && !listenInp.disabled && document.activeElement === listenInp){
      // checkListen is called via inline event; simulate it
      listenInp.dispatchEvent(new KeyboardEvent('keydown',{key:'Enter',bubbles:true}));
    }
  }
});

// ═══════════════════════════════════
//  PROGRESS EXPORT / IMPORT
// ═══════════════════════════════════
function exportProgress(){
  const json = JSON.stringify(state, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const dateStr = new Date().toISOString().split('T')[0];
  a.href     = url;
  a.download = `lingvoPRO_backup_${dateStr}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Прогресс экспортирован! 📁','success');
}

function importProgress(){
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json,application/json';
  input.onchange = e => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try{
        const imported = JSON.parse(ev.target.result);
        // Basic validation: must have userName field
        if(typeof imported !== 'object' || imported === null || !('xp' in imported)){
          showToast('Неверный файл прогресса','error');
          return;
        }
        state = {...state, ...imported};
        saveState();
        document.getElementById('nav-xp').textContent = state.xp + ' XP';
        updateNavAvatar();
        closeModal();
        navigateTo('home');
        showToast(`Прогресс загружен! 👋 ${state.userName}`, 'success');
      } catch(err){
        showToast('Ошибка при чтении файла','error');
      }
    };
    reader.readAsText(file);
  };
  document.body.appendChild(input);
  input.click();
  document.body.removeChild(input);
}
